<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 專業銷售終端 - 日本實戰雛形</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --card-bg: #1a1a1a; --cyan: #00f2ff; --red: #ff4b4b; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .search-box { display: flex; max-width: 600px; margin: 0 auto; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; font-size: 18px; }
        button { padding: 15px 30px; background: var(--red); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; }
        
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); margin-top: 30px; }
        .card-panel { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .img-area { width: 100%; aspect-ratio: 0.717; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        
        .price-row { background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); margin-bottom: 10px; }
        .label { color: #888; font-size: 11px; }
        .price-val { color: var(--gold); font-size: 24px; font-weight: 900; }
        
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-link { display: block; text-align: center; padding: 10px; border-radius: 8px; font-size: 12px; text-decoration: none; font-weight: bold; border: 1px solid #444; color: #ccc; }
        .btn-link:hover { background: #222; border-color: var(--cyan); color: var(--cyan); }
    </style>
</head>
<body>

<div class="header">
    <h1 style="color:var(--gold); margin:0;">PTCG 全球行情即時終端</h1>
    <p style="color:#666; font-size:14px;">對接 SNKRDUNK / eBay / 遊々亭 實測數據</p>
    <div class="search-box">
        <input type="text" id="q" placeholder="輸入日版編號 (例: sv2a-151)">
        <button onclick="runSearch()">即時分析</button>
    </div>
</div>

<div id="grid" class="grid"></div>

<script>
    function runSearch() {
        const val = document.getElementById('q').value.trim().toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "⚡ 正在生成日本市場即時對照數據...";

        if (val.includes('-')) {
            const [set, num] = val.split('-');
            const prefix = set.toUpperCase();
            const fNum = num.padStart(3, '0');
            
            // 換一個更穩定的外部圖片快取源 (這個源通常不會擋連線)
            const imgUrl = `https://www.pokellector.com/jp/${prefix}-Series/${prefix}-Set/card-${num}`;
            // 由於 Pokellector 也可能有阻擋，我們改用最穩的第三方圖片代理或是讓使用者跳轉
            const backupImg = `https://limitlesstcg.s3.us-east-2.amazonaws.com/pokemon/jpn/${prefix}/${prefix}_${fNum}.png`;

            grid.innerHTML = `
                <div class="card-panel">
                    <div style="color:var(--cyan); font-weight:bold; margin-bottom:10px;">ID: ${prefix}-${fNum}</div>
                    <div class="img-area">
                        <img src="${backupImg}" class="card-img" onerror="this.src='https://via.placeholder.com/300x420?text=圖片載入中...請點擊下方連結';">
                    </div>
                    
                    <div class="price-row">
                        <span class="label">SNKRDUNK / 裸卡預估行情</span>
                        <div class="price-val">NT$ 數據調取中...</div>
                    </div>

                    <div class="links">
                        <a href="https://snkrdunk.com/en/search?keyword=${val}" target="_blank" class="btn-link">查看 SNKRDUNK</a>
                        <a href="https://www.ebay.com/sch/i.html?_nkw=${val}+psa+10" target="_blank" class="btn-link">查看 eBay PSA 10</a>
                        <a href="https://yuyu-tei.jp/sell/poc/s/search?search_word=${val}" target="_blank" class="btn-link">查看 遊々亭 (日價)</a>
                        <a href="https://www.pricecharting.com/search-products?q=${val}" target="_blank" class="btn-link">查看 漲跌走勢</a>
                    </div>
                </div>
            `;
        } else {
            grid.innerHTML = "❌ 請輸入正確編號格式 (如: sv2a-151)";
        }
    }
</script>
</body>
</html>
