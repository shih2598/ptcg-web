<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 數據終端</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --panel: #1a1a1a; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .search-wrapper { max-width: 600px; margin: 0 auto 30px; text-align: center; }
        input { width: 70%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 16px; }
        button { padding: 15px 25px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .card { background: var(--panel); border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .card-img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .price { color: var(--gold); font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="search-wrapper">
        <h2>PTCG 日/中/英 跨界檢索</h2>
        <input type="text" id="query" placeholder="輸入 sv4k-014 或 炭小侍">
        <button onclick="search()">分析</button>
    </div>
    <div id="grid" class="grid"></div>
    <script>
        async function search() {
            const q = document.getElementById('query').value.trim();
            const grid = document.getElementById('grid');
            grid.innerHTML = "搜尋中...";
            try {
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(q)}`);
                const result = await res.json();
                grid.innerHTML = "";
                result.data.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <div style="font-size:10px; color:var(--cyan);">${item.id}</div>
                            <img src="${item.image_url}" class="card-img">
                            <div style="font-size:14px; height:40px;">${item.card_name}</div>
                            <div class="price">${item.market_price}</div>
                        </div>`;
                });
            } catch(e) { grid.innerHTML = "連線失敗"; }
        }
    </script>
</body>
</html>
