<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 全球數據終端 (實戰雛形)</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --card: #1a1a1a; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .search-container { max-width: 600px; margin: 40px auto; text-align: center; }
        input { width: 70%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; font-size: 18px; outline: none; }
        button { padding: 15px 30px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #222; }
        .img-box { width: 100%; aspect-ratio: 0.717; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .data-tag { background: #000; padding: 10px; border-radius: 10px; margin-top: 5px; border-left: 4px solid var(--gold); }
        .source-link { font-size: 11px; color: var(--cyan); text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="search-container">
    <h2 style="color:var(--gold)">PTCG 專業行情檢索 (日/美整合版)</h2>
    <input type="text" id="q" placeholder="輸入編號 (如 sv2a-151) 或 英文名">
    <button onclick="globalSearch()">搜尋行情</button>
</div>

<div id="grid" class="grid"></div>

<script>
    async function globalSearch() {
        const val = document.getElementById('q').value.trim().toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "🔍 正在串接 SNKRDUNK & eBay 數據庫...";

        // 自動處理編號格式
        let imgUrl = "";
        let displayId = val.toUpperCase();

        if (val.includes('-')) {
            const [set, num] = val.split('-');
            const formattedNum = num.padStart(3, '0');
            // 改用不受 CORS 限制的日版快取來源 (模擬 SNKRDUNK/遊遊亭 路徑)
            imgUrl = `https://limitlesstcg.s3.us-east-2.amazonaws.com/pokemon/jpn/${set.toUpperCase()}/${set.toUpperCase()}_${formattedNum}.png`;
        }

        try {
            // 同步呼叫後端抓取 eBay/PriceCharting 行情
            const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(val)}`);
            const data = await res.json();
            
            grid.innerHTML = "";
            const item = data.data[0] || { twd_price: "價格獲取中", psa10_ref: "計算中" };

            // 如果上面沒生成日版圖，就用美版備份圖
            const finalImg = imgUrl || item.image_en;

            grid.innerHTML += `
                <div class="card">
                    <div style="color:var(--cyan); font-size:12px; margin-bottom:5px;">ID: ${displayId}</div>
                    <div class="img-box">
                        <img src="${finalImg}" class="card-img" onerror="this.src='https://via.placeholder.com/300x420?text=圖片載入中...';">
                    </div>
                    <div class="data-tag">
                        <div style="font-size:11px; color:#666;">日版實體預估 (SNKRDUNK 參考)</div>
                        <div style="font-size:20px; font-weight:bold; color:var(--gold);">NT$ ${item.twd_price.toLocaleString()}</div>
                    </div>
                    <div class="data-tag" style="border-left-color: var(--cyan);">
                        <div style="font-size:11px; color:#666;">PSA 10 全球成交價 (eBay)</div>
                        <div style="font-size:18px; font-weight:bold; color:var(--cyan);">NT$ ${item.psa10_ref.toLocaleString()}</div>
                    </div>
                    <a href="https://www.ebay.com/sch/i.html?_nkw=${val}+psa+10" target="_blank" class="source-link">↗ 查看 eBay 即時成交紀錄</a>
                </div>
            `;
        } catch (e) {
            grid.innerHTML = "❌ 數據讀取超時，請重新嘗試";
        }
    }
</script>
</body>
</html>
