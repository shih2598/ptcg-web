<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG 日美數據監控</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --jp-red: #ff4444; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        .header { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .search-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; }
        button { padding: 10px 25px; background: var(--gold); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 15px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { background: #161616; border-radius: 12px; padding: 12px; border: 1px solid #222; }
        .card-id { font-size: 10px; color: var(--jp-red); font-family: monospace; margin-bottom: 5px; }
        .card-img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .card-name { font-size: 13px; font-weight: bold; margin-bottom: 10px; height: 32px; overflow: hidden; }
        .price-box { border-top: 1px solid #222; padding-top: 10px; font-size: 12px; }
        .psa { color: var(--gold); font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="margin-bottom:10px; font-size:12px; color:#888;">🇯🇵 日版優先搜尋模式 (支援 sv4k-14 等編號)</div>
            <div class="search-group">
                <input type="text" id="cardName" placeholder="搜尋編號或英文名稱">
                <button onclick="doSearch()">分析行情</button>
            </div>
        </div>
        <div id="result-grid" class="grid"></div>
    </div>

    <script>
        async function doSearch() {
            const query = document.getElementById('cardName').value.trim();
            const grid = document.getElementById('result-grid');
            if(!query) return;
            grid.innerHTML = "⚡ 正在嘗試多重匹配資料庫...";

            try {
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(query)}`);
                const result = await res.json();
                grid.innerHTML = "";

                if (result.data && result.data.length > 0) {
                    result.data.forEach(item => {
                        const price = Math.round(parseFloat(item.market_price.replace('$','')) * 32.5);
                        grid.innerHTML += `
                            <div class="card">
                                <div class="card-id">${item.id.toUpperCase()}</div>
                                <img src="${item.image_url}" class="card-img">
                                <div class="card-name">${item.card_name}</div>
                                <div class="price-box">
                                    <div>美版行情：NT$ ${price.toLocaleString()}</div>
                                    <div class="psa">PSA 10 預估：${item.psa10_price}</div>
                                    <div style="font-size:9px; color:#555; margin-top:5px;">Set: ${item.set_name}</div>
                                </div>
                            </div>`;
                    });
                } else {
                    grid.innerHTML = "查無結果，可能是該日版系列尚未收錄。";
                }
            } catch (e) { grid.innerHTML = "系統連線異常"; }
        }
    </script>
</body>
</html>
