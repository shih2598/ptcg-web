<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG 行情分析終端</title>
    <style>
        :root { --app-gold: #ffcc00; --bg: #121212; --card-bg: #1e1e1e; --text-gray: #aaa; --trend-up: #4caf50; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: env(safe-area-inset-top) 15px 20px; }
        
        /* 頂部搜尋欄 (Sticky) */
        .header { background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(10px); padding: 15px; border-radius: 0 0 20px 20px; margin: -20px -15px 20px -15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .search-group { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; }
        button { padding: 12px 20px; background: var(--app-gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* 行情清單 */
        #result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; max-width: 800px; margin: 0 auto; }
        .card-box { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #333; display: flex; flex-direction: column; }
        .card-top { display: flex; gap: 15px; margin-bottom: 12px; }
        .card-img { width: 85px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card-main-info { flex: 1; }
        .card-title { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .card-id { font-size: 11px; color: var(--app-gold); background: rgba(255,204,0,0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* 多平台價格比對區 */
        .market-table { background: #252525; border-radius: 10px; padding: 10px; margin-top: 5px; }
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #333; }
        .price-row:last-child { border-bottom: none; }
        .platform { font-size: 12px; color: var(--text-gray); display: flex; align-items: center; gap: 5px; }
        .platform::before { content: "•"; color: var(--app-gold); }
        .price-val { font-family: 'Monaco', monospace; font-weight: bold; color: #fff; }
        .trend { font-size: 11px; color: var(--trend-up); margin-left: 5px; }

        #status { text-align: center; font-size: 12px; color: #666; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="search-group">
            <input type="text" id="cardName" placeholder="搜尋中文或英文卡名...">
            <button onclick="fetchAnalysis()">分析</button>
        </div>
    </div>

    <div id="status">已連接至 Render 雲端 API v7</div>
    <div id="result-grid"></div>

    <script>
        async function fetchAnalysis() {
            const name = document.getElementById('cardName').value;
            const grid = document.getElementById('result-grid');
            const statusDiv = document.getElementById('status');
            if(!name) return;

            statusDiv.innerText = "⏳ 正在同步 eBay/SNKRDUNK 全球數據...";
            grid.innerHTML = "";

            try {
                // 已修改為對接你的 Render 網址
                const response = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(name)}`);
                const res = await response.json();

                if(res.status === 'success') {
                    statusDiv.innerText = `✅ 成功獲取 ${res.data.length} 筆深度數據`;
                    res.data.forEach(item => {
                        let priceHtml = item.prices.map(p => {
                            // 匯率簡單換算 (這部分未來可由後端統一處理)
                            const displayVal = p.value.includes('$') ? `NT$ ${Math.round(parseFloat(p.value.replace('$ ','')) * 32.5).toLocaleString()}` : p.value;
                            return `
                                <div class="price-row">
                                    <span class="platform">${p.platform} (${p.type})</span>
                                    <span class="price-val">${displayVal} <span class="trend">${p.trend}</span></span>
                                </div>
                            `;
                        }).join('');

                        grid.innerHTML += `
                            <div class="card-box">
                                <div class="card-top">
                                    <img class="card-img" src="${item.image_url}">
                                    <div class="card-main-info">
                                        <div class="card-title">${item.card_name}</div>
                                        <div class="card-id">${item.set_info}</div>
                                        <div style="font-size:10px; color:#555; margin-top:8px;">最後更新: ${item.update_time}</div>
                                    </div>
                                </div>
                                <div class="market-table">
                                    ${priceHtml}
                                </div>
                                <a href="https://www.tcgplayer.com/search/pokemon/product?q=${encodeURIComponent(item.card_name)}" target="_blank" 
                                   style="text-align:center; color:#555; font-size:11px; margin-top:10px; text-decoration:none;">查看原始交易明細 ↗</a>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                statusDiv.innerText = "❌ 雲端喚醒中或連線異常，請等候 30 秒再試";
            }
        }
    </script>
</body>
</html>
