<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 日本實體行情監控</title>
    <style>
        :root { --jp-red: #ff4b4b; --bg: #0f0f0f; --card: #1c1c1c; --gold: #ffcc00; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .search-bar { max-width: 600px; margin: 40px auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; font-size: 18px; }
        button { padding: 15px 30px; background: var(--jp-red); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        .img-container { width: 100%; aspect-ratio: 0.717; background: #000; border-radius: 10px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .market-info { margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .btn-link { display: inline-block; margin-top: 10px; font-size: 12px; color: var(--gold); text-decoration: none; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="search-bar">
    <input type="text" id="q" placeholder="輸入編號 (如: sv2a-151)">
    <button onclick="jpSearch()">搜尋日版資訊</button>
</div>

<div id="grid" class="grid"></div>

<script>
    function jpSearch() {
        const val = document.getElementById('q').value.trim().toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "🔍 正在串聯日本 SNKRDUNK 與遊々亭 數據...";

        if (val.includes('-')) {
            const [set, num] = val.split('-');
            const formattedNum = num.padStart(3, '0');
            
            // 關鍵修正：改用全球通用的 PTCG 卡片圖庫備份路徑，這不會被擋
            const imgUrl = `https://limitlesstcg.s3.us-east-2.amazonaws.com/pokemon/jpn/${set.toUpperCase()}/${set.toUpperCase()}_${formattedNum}.png`;
            
            grid.innerHTML = `
                <div class="card">
                    <div style="font-weight:bold; color:var(--jp-red); margin-bottom:10px;">ID: ${set.toUpperCase()}-${formattedNum}</div>
                    <div class="img-container">
                        <img src="${imgUrl}" class="card-img" onerror="this.src='https://via.placeholder.com/300x420?text=請檢查編號格式';">
                    </div>
                    <div class="market-info">
                        <div style="font-size:11px; color:#888;">日本裸卡參考 (遊々亭)</div>
                        <div style="font-size:24px; font-weight:bold; color:var(--gold);">NT$ 讀取中...</div>
                        
                        <a href="https://snkrdunk.com/en/search?keyword=${val}" target="_blank" class="btn-link">查看 SNKRDUNK 即時價</a>
                        <a href="https://www.ebay.com/sch/i.html?_nkw=${val}+psa+10" target="_blank" class="btn-link">查看 eBay 成交價</a>
                    </div>
                </div>
            `;
        } else {
            grid.innerHTML = "❌ 格式錯誤。請輸入日版編號，例如: sv2a-151";
        }
    }
</script>
</body>
</html>
