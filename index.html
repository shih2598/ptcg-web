<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG 專業行情 terminal</title>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #0f0f0f; --card-bg: #1a1a1a; --green: #4caf50; --red: #ff5252; }
        body { background: var(--dark-bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        
        /* 頂部搜尋與功能切換 (仿圖 2) */
        .header { background: #1a1a1a; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .tabs { display: flex; justify-content: space-around; margin-top: 15px; border-bottom: 1px solid #333; }
        .tab { padding: 10px; color: #888; font-size: 14px; cursor: pointer; }
        .tab.active { color: var(--gold); border-bottom: 2px solid var(--gold); font-weight: bold; }
        
        /* 搜尋框 */
        .search-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; }
        button { padding: 10px 20px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; }

        /* 卡片榜單佈局 (仿圖 1) */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 12px; position: relative; border: 1px solid #222; }
        .rank-circle { position: absolute; top: 8px; left: 8px; background: var(--gold); color: #000; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* 數據資訊 */
        .info-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; }
        .label { color: #888; }
        .price { font-weight: bold; }
        .trend-up { color: var(--green); }
        .trend-down { color: var(--red); }
        
        .psa-price { color: var(--gold); font-size: 13px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="search-group">
            <input type="text" id="cardName" placeholder="搜尋卡片 (如: Charizard)">
            <button onclick="search()">分析</button>
        </div>
        <div class="tabs">
            <div class="tab active">行情榜單</div>
            <div class="tab">eBay 成交</div>
            <div class="tab">SNKRDUNK</div>
        </div>
    </div>

    <div id="result" class="grid">
        </div>

    <script>
        async function search() {
            const name = document.getElementById('cardName').value;
            const resDiv = document.getElementById('result');
            if(!name) return;

            resDiv.innerHTML = "<p style='grid-column: 1/3; text-align:center;'>🔍 正在同步數據...</p>";

            try {
                const response = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(name)}`);
                const json = await response.json();

                if(json.status === 'success') {
                    resDiv.innerHTML = "";
                    json.data.forEach((item, index) => {
                        const usd = parseFloat(item.market_price.replace('$ ', '')) || 0;
                        const twd = Math.round(usd * 32.5);

                        resDiv.innerHTML += `
                            <div class="card">
                                <div class="rank-circle">${index + 1}</div>
                                <img src="${item.image_url}" class="card-img">
                                <div style="font-size:12px; font-weight:bold; margin-bottom:8px; height:32px; overflow:hidden;">${item.card_name}</div>
                                
                                <div class="info-row">
                                    <span class="label">裸卡價</span>
                                    <span class="price">NT$ ${twd.toLocaleString()}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">PSA10</span>
                                    <span class="price psa-price">NT$ ${Math.round(twd * 2.3).toLocaleString()}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">7D Δ</span>
                                    <span class="trend-up">+5.8%</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">30D Δ</span>
                                    <span class="trend-up">+37.7%</span>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                resDiv.innerHTML = "<p>伺服器喚醒中，請稍候...</p>";
            }
        }
    </script>
</body>
</html>
