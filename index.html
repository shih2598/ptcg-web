<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 銷售專家數據終端</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --card: #1a1a1a; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .search-ui { max-width: 600px; margin: 40px auto; text-align: center; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        .input-wrap { display: flex; gap: 10px; margin-top: 20px; }
        input { flex: 1; padding: 15px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 18px; }
        button { background: var(--gold); border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); margin-top: 30px; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #222; }
        .img-container { width: 100%; aspect-ratio: 0.717; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 15px; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: contain; }
        .price-info { background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); }
    </style>
</head>
<body>

<div class="search-ui">
    <h2 style="color:var(--gold); margin:0;">PTCG 專業檢索系統</h2>
    <p style="font-size:12px; color:#666;">支援：sv2a-151, sv4k-014 等日版格式</p>
    <div class="input-wrap">
        <input type="text" id="userInput" placeholder="輸入編號或名稱">
        <button onclick="masterSearch()">搜尋數據</button>
    </div>
</div>

<div id="grid" class="grid"></div>

<script>
    async function masterSearch() {
        const val = document.getElementById('userInput').value.trim().toLowerCase();
        const grid = document.getElementById('grid');
        grid.innerHTML = "🔍 全速調取數據中...";

        try {
            // 直接對接你的後端 API (Render)
            const response = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(val)}`);
            const data = await response.json();
            
            grid.innerHTML = "";
            if (data.status === "success" && data.data.length > 0) {
                data.data.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <div style="color:var(--cyan); font-size:12px; font-weight:bold; margin-bottom:10px;">ID: ${item.id}</div>
                            <div class="img-container">
                                <img src="${item.image_en}" class="card-img" alt="Card Image">
                            </div>
                            <div style="font-weight:bold; margin-bottom:10px;">${item.en_name}</div>
                            <div class="price-info">
                                <div style="color:#888; font-size:11px;">市場行情 (TWD)</div>
                                <div style="color:var(--gold); font-size:22px; font-weight:900;">NT$ ${item.twd_price.toLocaleString()}</div>
                                <div style="color:var(--cyan); font-size:12px; margin-top:5px;">PSA 10 參考: NT$ ${item.psa10_ref.toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                grid.innerHTML = "❌ 查無資料，請確認輸入內容";
            }
        } catch (e) {
            grid.innerHTML = "⚠️ 無法連線到伺服器";
        }
    }
</script>
</body>
</html>
