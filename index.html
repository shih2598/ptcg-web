<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG 日美行情終端</title>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #0a0a0a; --card-bg: #161616; --jp-red: #ff4444; }
        body { background: var(--dark-bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; padding: 10px; box-sizing: border-box; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #333; position: sticky; top: 10px; z-index: 100; }
        .mode-tags { display: flex; gap: 8px; margin-bottom: 12px; }
        .tag { padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; background: #222; color: #666; border: 1px solid #333; }
        .tag.active { border-color: var(--jp-red); color: #fff; background: rgba(255, 68, 68, 0.1); }
        .search-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; }
        button { padding: 10px 20px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 12px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { background: var(--card-bg); border-radius: 15px; padding: 12px; border: 1px solid #222; }
        .card-id { font-size: 10px; font-weight: bold; margin-bottom: 6px; font-family: monospace; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 8px; aspect-ratio: 3/4; object-fit: contain; background: #000; }
        .card-name { font-size: 12px; font-weight: bold; height: 34px; overflow: hidden; margin-bottom: 8px; color: #eee; }
        .data-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
        .psa-val { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="mode-tags">
                <div class="tag active">🇯🇵 日版資料優先</div>
                <div class="tag">🇺🇸 美版行情參考</div>
            </div>
            <div class="search-group">
                <input type="text" id="cardName" placeholder="輸入編號 (如: sv4k-014) 或 英文名">
                <button onclick="doSearch()">分析</button>
            </div>
        </div>
        <div id="result-grid" class="grid">
            <div style="grid-column: 1/-1; text-align: center; color: #444; padding: 100px 0;">請輸入日版編號開始測試</div>
        </div>
    </div>

    <script>
        async function doSearch() {
            const query = document.getElementById('cardName').value.trim();
            const grid = document.getElementById('result-grid');
            if(!query) return;
            
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--gold);">⚡ 正在搜尋日版精準數據...</div>';

            try {
                // 這次我們讓後端處理所有編號轉義
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(query)}`);
                const result = await res.json();
                
                if (result.status === "success") {
                    grid.innerHTML = "";
                    if(result.data.length === 0) {
                        grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:50px; color:#888;">查無結果，請確認編號格式 (如 sv4k-14)</div>';
                        return;
                    }

                    result.data.forEach((item) => {
                        const price = Math.round((parseFloat(item.market_price.replace('$ ', '')) || 0) * 32.5);
                        const isJp = item.id.includes('jp') || item.id.startsWith('s');
                        
                        grid.innerHTML += `
                            <div class="card">
                                <div class="card-id" style="color: ${isJp ? 'var(--jp-red)' : 'var(--gold)'}">${isJp ? '🇯🇵' : '🇺🇸'} ${item.id.toUpperCase()}</div>
                                <img src="${item.image_url}" class="card-img" onerror="this.src='https://via.placeholder.com/150x210?text=No+Image'">
                                <div class="card-name">${item.card_name}</div>
                                <div class="data-row"><span style="color:#888">美版價格</span><span>NT$ ${price.toLocaleString()}</span></div>
                                <div class="data-row"><span style="color:#888">PSA 10 估值</span><span class="psa-val">${item.psa10_price}</span></div>
                            </div>`;
                    });
                }
            } catch (e) { grid.innerHTML = "連線失敗"; }
        }
    </script>
</body>
</html>
