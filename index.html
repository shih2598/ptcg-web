<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG 專業行情分析終端</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #0a0a0a; --card-bg: #161616; --green: #4caf50; --red: #ff5252; --text-gray: #888; }
        body { background: var(--dark-bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 10px; }
        .header-container { background: #1a1a1a; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .search-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #222; color: white; outline: none; font-size: 14px; }
        button { padding: 10px 18px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }
        .tabs { display: flex; justify-content: space-around; background: #222; border-radius: 10px; padding: 4px; margin-top: 10px; }
        .tab { flex: 1; text-align: center; padding: 8px; font-size: 12px; color: #666; border-radius: 8px; }
        .tab.active { background: #333; color: var(--gold); font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 10px; position: relative; border: 1px solid #222; display: flex; flex-direction: column; }
        .rank-badge { position: absolute; top: 8px; left: 8px; background: var(--gold); color: #000; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 10px; min-height: 150px; background: #222; }
        .card-name { font-size: 11px; font-weight: bold; margin-bottom: 8px; height: 28px; overflow: hidden; color: #eee; }
        .data-box { border-top: 1px solid #222; padding-top: 8px; }
        .data-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; }
        .label { color: var(--text-gray); }
        .val { font-weight: 600; color: #fff; }
        .psa { color: var(--gold); }
        .chart-btn { width: 100%; margin-top: 10px; padding: 6px; background: #222; border: 1px solid #333; color: #888; font-size: 9px; border-radius: 6px; cursor: pointer; }
        .chart-con { display: none; margin-top: 10px; background: #000; border-radius: 8px; padding: 5px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="search-group">
            <input type="text" id="cardName" placeholder="搜尋名稱或卡號 (如: M2A-014)">
            <button id="searchBtn" onclick="executeSearch()">分析</button>
        </div>
        <div style="font-size: 10px; color: #555; text-align: center;">💡 提示：輸入「系列-編號」可進行精準查詢</div>
        <div class="tabs">
            <div class="tab active">行情榜單</div>
            <div class="tab">eBay 成交</div>
            <div class="tab">SNKRDUNK</div>
        </div>
    </div>

    <div id="result-grid" class="grid">
        <div style="grid-column: 1/3; text-align: center; color: #444; margin-top: 50px;">請輸入卡片名稱開始分析</div>
    </div>

    <script>
        async function executeSearch() {
            var nameInput = document.getElementById('cardName');
            var grid = document.getElementById('result-grid');
            var name = nameInput.value.trim();
            
            if (!name) {
                alert("請輸入卡片名稱");
                return;
            }

            // 步驟 1: 顯示連線狀態
            grid.innerHTML = '<div style="grid-column: 1/3; text-align:center; padding: 20px;">⚡ 正在連線 Render 伺服器...</div>';

            try {
                // 步驟 2: 抓取數據
                var url = "https://ptcg-api-service.onrender.com/api/search?name=" + encodeURIComponent(name);
                var response = await fetch(url);
                var resData = await response.json();

                if (resData.status === "success") {
                    grid.innerHTML = ""; // 清空提示
                    
                    if (resData.data.length === 0) {
                        grid.innerHTML = '<div style="grid-column: 1/3; text-align:center;">找不到卡片，請更換關鍵字</div>';
                        return;
                    }

                    // 步驟 3: 產生卡片 HTML
                    resData.data.forEach(function(item, index) {
                        var priceUSD = parseFloat(item.market_price.replace('$ ', '')) || 0;
                        var priceTWD = Math.round(priceUSD * 32.5);
                        var cid = "chart-" + index;

                        var cardHtml = '<div class="card">' +
                            '<div class="rank-badge">' + (index + 1) + '</div>' +
                            '<img src="' + item.image_url + '" class="card-img">' +
                            '<div class="card-name">' + item.card_name + '</div>' +
                            '<div class="data-box">' +
                                '<div class="data-row"><span class="label">裸卡價</span><span class="val">NT$ ' + priceTWD.toLocaleString() + '</span></div>' +
                                '<div class="data-row"><span class="label">PSA 10</span><span class="val psa">NT$ ' + Math.round(priceTWD * 2.5).toLocaleString() + '</span></div>' +
                                '<div class="data-row"><span class="label">7D Δ</span><span class="val" style="color:#4caf50">' + item.trend_7d + '</span></div>' +
                                '<div class="data-row"><span class="label">30D Δ</span><span class="val" style="color:#4caf50">' + item.trend_30d + '</span></div>' +
                            '</div>' +
                            '<button class="chart-btn" onclick="toggleChart(\'' + cid + '\')">📉 查看價格走勢</button>' +
                            '<div class="chart-con" id="con-' + cid + '"><canvas id="' + cid + '" height="70"></canvas></div>' +
                        '</div>';
                        
                        grid.innerHTML += cardHtml;
