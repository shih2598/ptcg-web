<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG 專業行情監控</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --card-bg: #161616; --accent: #ff4444; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        
        .header { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .nav-info { font-size: 12px; color: #888; margin-bottom: 12px; display: flex; gap: 10px; }
        
        .search-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #444; background: #000; color: white; font-size: 16px; outline: none; }
        button { padding: 10px 25px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        .grid { display: grid; gap: 15px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: #555; }
        
        .card-id { font-size: 10px; color: var(--accent); font-family: monospace; margin-bottom: 8px; font-weight: bold; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 12px; aspect-ratio: 3/4; object-fit: contain; background: #000; }
        .card-name { font-size: 13px; font-weight: bold; margin-bottom: 10px; height: 32px; overflow: hidden; line-height: 1.2; }
        
        .info-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; }
        .label { color: #777; }
        .price { color: #fff; font-weight: bold; }
        .psa { color: var(--gold); font-weight: bold; }
        .set-tag { font-size: 9px; color: #444; margin-top: 10px; border-top: 1px solid #222; padding-top: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="nav-info">
                <span>🇯🇵 日版編號優先</span>
                <span>🇺🇸 美版行情連動</span>
                <span>💎 精準匹配模式</span>
            </div>
            <div class="search-group">
                <input type="text" id="cardName" placeholder="請輸入編號 (如: sv4k-014)">
                <button onclick="doSearch()">分析數據</button>
            </div>
        </div>

        <div id="result-grid" class="grid"></div>
    </div>

    <script>
        async function doSearch() {
            const query = document.getElementById('cardName').value.trim();
            const grid = document.getElementById('result-grid');
            if(!query) return;

            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 80px; color: var(--gold);">⚡ 執行精準映射邏輯中...</div>';

            try {
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(query)}`);
                const result = await res.json();
                
                grid.innerHTML = "";
                if (result.status === "success" && result.data.length > 0) {
                    result.data.forEach(item => {
                        grid.innerHTML += `
                            <div class="card">
                                <div class="card-id">${item.id}</div>
                                <img src="${item.image_url}" class="card-img" loading="lazy">
                                <div class="card-name">${item.card_name}</div>
                                <div class="info-row">
                                    <span class="label">市場行情</span>
                                    <span class="price">${item.market_price_twd}</span>
                                </div>
                                <div class="info-row">
                                    <span class="label">PSA 10 估值</span>
                                    <span class="psa">${item.psa10_est}</span>
                                </div>
                                <div class="set-tag">來源系列: ${item.set_name}</div>
                            </div>`;
                    });
                } else {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 80px; color: #666;">查無此編號，請嘗試更換關鍵字。</div>';
                }
            } catch (e) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 80px; color: var(--accent);">系統連線異常，請檢查後端服務。</div>';
            }
        }
    </script>

</body>
</html>
