<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 專業銷售終端 - 日版模式</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --card-bg: #1a1a1a; --up: #4caf50; --down: #f44336; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .card { background: var(--card-bg); border-radius: 15px; padding: 20px; border: 1px solid #333; }
        
        /* 圖片容器：確保抓不到中文圖時有備案 */
        .img-container { width: 100%; aspect-ratio: 0.717; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        
        .price-box { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        .trend-row { display: flex; justify-content: space-between; font-size: 13px; margin-top: 10px; }
        .up { color: var(--up); } .down { color: var(--down); }
        .info-label { color: #666; font-size: 11px; }
    </style>
</head>
<body>
    <div style="text-align:center; margin-bottom:40px;">
        <h1 style="color:var(--gold)">PTCG 日/台版專業檢索</h1>
        <input type="text" id="query" placeholder="輸入編號 (如 SV4K-014) 或 中文名" style="padding:15px; width:300px; border-radius:10px;">
        <button onclick="doSearch()" style="padding:15px; background:var(--gold); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">查詢行情</button>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        function getTwImg(id) {
            // 將 sv4k-14 轉換成 SV4K_014.png 的格式
            const parts = id.split('-');
            const prefix = parts[0].toUpperCase();
            const num = parts[1].padStart(3, '0');
            return `https://asia.pokemon-card.com/tw/card-img/pokemon/${prefix}_${num}.png`;
        }

        async function doSearch() {
            const q = document.getElementById('query').value.trim();
            const grid = document.getElementById('grid');
            grid.innerHTML = "數據加載中...";
            
            const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(q)}`);
            const data = await res.json();
            grid.innerHTML = "";

            data.data.forEach(item => {
                const twImg = getTwImg(item.raw_id);
                grid.innerHTML += `
                    <div class="card">
                        <div style="color:var(--cyan); font-size:12px; font-weight:bold; margin-bottom:10px;">${item.id}</div>
                        <div class="img-container">
                            <img src="${twImg}" class="card-img" onerror="this.src='${item.image_url_en}'">
                        </div>
                        <div style="font-weight:bold; margin-bottom:10px;">${item.card_name}</div>
                        
                        <div class="price-box">
                            <span class="info-label">日版預估行情</span>
                            <div style="color:var(--gold); font-size:20px; font-weight:bold;">${item.market_price}</div>
                            
                            <div class="trend-row">
                                <span>7D 走勢: <b class="up">${item.trend_7d}</b></span>
                                <span>30D 走勢: <b class="down">${item.trend_30d}</b></span>
                            </div>
                        </div>

                        <div class="price-box" style="border: 1px solid #333;">
                            <span class="info-label">全球 PSA 10 參考價值</span>
                            <div style="color:var(--cyan); font-size:18px; font-weight:bold;">${item.psa10}</div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
