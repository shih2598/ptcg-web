<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 專業銷售終端 - 全圖鑑實戰版</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --card: #151515; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: system-ui, -apple-system, sans-serif; padding: 20px; }
        .search-zone { max-width: 700px; margin: 50px auto; text-align: center; background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .input-box { display: flex; gap: 10px; margin-top: 25px; }
        input { flex: 1; padding: 20px; border-radius: 15px; border: 1px solid #333; background: #000; color: white; font-size: 20px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,204,0,0.2); }
        button { padding: 0 40px; background: var(--gold); border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .grid { display: grid; gap: 30px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); margin-top: 40px; }
        .card-ui { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; transition: 0.3s; }
        .card-ui:hover { border-color: var(--gold); transform: scale(1.02); }
        .img-slot { width: 100%; aspect-ratio: 0.717; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .price-badge { background: linear-gradient(135deg, #000, #111); padding: 15px; border-radius: 15px; border-left: 5px solid var(--gold); }
        .label { color: #666; font-size: 12px; margin-bottom: 5px; }
        .val { color: var(--gold); font-size: 24px; font-weight: 900; }
    </style>
</head>
<body>

<div class="search-zone">
    <h1 style="margin:0; letter-spacing: 2px;">PTCG 專業行情檢索</h1>
    <p style="color: #555;">支援日/台版全圖鑑編號 (如: sv2a-151, sv4k-014)</p>
    <div class="input-row">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="輸入編號 (sv4k-014) 或 卡片名稱">
            <button onclick="startAction()">分析數據</button>
        </div>
    </div>
</div>

<div id="grid" class="grid"></div>

<script>
    // 智慧型對照表：擴充這個表，你的「中文搜尋」就會越來越強
    const INTELLI_DICT = {
        "夢幻": "sv2a-151",
        "小火龍": "sv2p-010",
        "水箭龜": "sv2a-009",
        "噴火龍": "sv4k-085",
        "炭小侍": "sv4k-014",
        "皮卡丘": "sv2a-025"
    };

    function startAction() {
        let val = document.getElementById('userInput').value.trim().toLowerCase();
        const grid = document.getElementById('grid');
        
        // 1. 如果是中文，直接查表轉編號
        if (INTELLI_DICT[val]) val = INTELLI_DICT[val];

        // 2. 核心邏輯：只要包含 "-" 就強制生成官方路徑
        if (val.includes('-')) {
            const [set, num] = val.split('-');
            const prefix = set.toUpperCase();
            const formattedNum = num.padStart(3, '0');
            
            // 台灣官方圖庫路徑 (100% 繁體中文)
            const twUrl = `https://asia.pokemon-card.com/tw/card-img/pokemon/${prefix}_${formattedNum}.png`;
            
            grid.innerHTML = `
                <div class="card-ui">
                    <div style="color:var(--cyan); font-weight:bold; margin-bottom:10px;">ID: ${prefix}-${formattedNum}</div>
                    <div class="img-slot">
                        <img src="${twUrl}" class="card-img" 
                             onerror="this.onerror=null; this.src='https://via.placeholder.com/300x420?text=非標準日版編號';">
                    </div>
                    <div class="price-badge">
                        <div class="label">預估市場行情 (TWD)</div>
                        <div class="val">NT$ 讀取中...</div>
                        <div style="margin-top:10px; font-size:12px; color:#444;">走勢: 穩定 [全球同步]</div>
                    </div>
                </div>
            `;
        } else {
            grid.innerHTML = "<p style='text-align:center; width:100%; color:#555;'>請輸入格式如 'sv4k-014' 的編號，或是已知的中文名。</p>";
        }
    }
</script>

</body>
</html>
