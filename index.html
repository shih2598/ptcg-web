<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG 專業分析終端</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #0a0a0a; --card-bg: #161616; --text-gray: #888; }
        body { background: var(--dark-bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #222; position: sticky; top: 0; z-index: 100; text-align: center; }
        .search-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #222; color: white; }
        button { padding: 10px 18px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid #222; position: relative; }
        .rank { position: absolute; top: 8px; left: 8px; background: var(--gold); color: #000; width: 20px; height: 20px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 5px; }
        .card-name { font-size: 11px; height: 28px; overflow: hidden; margin-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; }
        .val { color: #fff; font-weight: bold; }
        .chart-btn { width: 100%; margin-top: 5px; padding: 5px; background: #333; color: var(--gold); border: none; border-radius: 5px; font-size: 9px; cursor: pointer; }
        .chart-con { display: none; margin-top: 5px; background: #000; border-radius: 5px; padding: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="search-group">
            <input type="text" id="cardName" placeholder="輸入名稱 (如: 噴火龍)">
            <button onclick="doSearch()">分析</button>
        </div>
        <div style="font-size: 10px; color: #666;">💡 提示：輸入 M2A-014 可精準查詢</div>
    </div>

    <div id="result-grid" class="grid">
        <div style="grid-column: 1/3; text-align: center; color: #555; margin-top: 50px;">請輸入名稱後按分析</div>
    </div>

    <script>
        // 核心搜尋函式
        async function doSearch() {
            var name = document.getElementById('cardName').value;
            var grid = document.getElementById('result-grid');
            
            if (!name) {
                alert("請輸入名稱");
                return;
            }

            // 1. 強制讓畫面上字
            grid.innerHTML = '<div style="grid-column:1/3; text-align:center; padding:20px;">⚡ 正在連線伺服器...</div>';

            try {
                // 2. 請求資料
                var apiUrl = "https://ptcg-api-service.onrender.com/api/search?name=" + encodeURIComponent(name);
                var response = await fetch(apiUrl);
                var result = await response.json();

                if (result.status === "success") {
                    grid.innerHTML = ""; // 清空

                    if (result.data.length === 0) {
                        grid.innerHTML = '<div style="grid-column:1/3; text-align:center;">找不到資料</div>';
                        return;
                    }

                    // 3. 迴圈產出卡片
                    result.data.forEach(function(item, i) {
                        var price = Math.round((parseFloat(item.market_price.replace('$ ', '')) || 0) * 32.5);
                        var cid = "c-" + i;
                        
                        var html = '<div class="card">' +
                            '<div class="rank">' + (i+1) + '</div>' +
                            '<img src="' + item.image_url + '" class="card-img">' +
                            '<div class="card-name">' + item.card_name + '</div>' +
                            '<div class="data-row"><span>裸卡價</span><span class="val">NT$ ' + price.toLocaleString() + '</span></div>' +
                            '<div class="data-row"><span>7D Δ</span><span class="val" style="color:#4caf50">' + item.trend_7d + '</span></div>' +
                            '<div class="data-row"><span>30D Δ</span><span class="val" style="color:#4caf50">' + item.trend_30d + '</span></div>' +
                            '<button class="chart-btn" onclick="showChart(\'' + cid + '\')">走勢圖</button>' +
                            '<div class="chart-con" id="con-' + cid + '"><canvas id="' + cid + '" height="80"></canvas></div>' +
                        '</div>';
                        
                        grid.innerHTML += html;
                    });
                }
            } catch (err) {
                grid.innerHTML = '<div style="grid-column:1/3; text-align:center;">❌ 失敗，請確認後端已連線</div>';
            }
        }

        function showChart(id) {
            var box = document.getElementById("con-" + id);
            box.style.display = (box.style.display === "block") ? "none" : "block";
            if (box.style.display === "block") {
                var ctx = document.getElementById(id).getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['','','','','',''],
                        datasets: [{ data: [50, 60, 55, 70, 65, 80], borderColor: '#ffcc00', borderWidth: 2, pointRadius: 0, fill: false }]
                    },
                    options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
                });
            }
        }
    </script>
</body>
</html>
