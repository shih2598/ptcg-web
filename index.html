<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG 數據監控</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --card-bg: #161616; --accent: #ff4444; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 1000px; }
        .header { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        .search-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #444; background: #000; color: white; font-size: 16px; outline: none; }
        button { padding: 10px 25px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; gap: 15px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; border: 1px solid #222; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 12px; background: #000; }
        .status { grid-column: 1/-1; text-align: center; padding: 80px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 12px; color: #888; margin-bottom: 10px;">🛡️ 唯一 ID 鎖定模式：杜絕編號錯位</div>
            <div class="search-group">
                <input type="text" id="cardName" placeholder="輸入編號 (如: sv4k-014)">
                <button onclick="doSearch()">分析</button>
            </div>
        </div>
        <div id="result-grid" class="grid"><div class="status">等待輸入...</div></div>
    </div>
    <script>
        async function doSearch() {
            const query = document.getElementById('cardName').value.trim();
            const grid = document.getElementById('result-grid');
            if(!query) return;
            grid.innerHTML = '<div class="status" style="color:var(--gold)">⚡ 正在精準抓取數據...</div>';
            try {
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(query)}&t=${Date.now()}`);
                const result = await res.json();
                if (result.status === "success" && result.data.length > 0) {
                    grid.innerHTML = "";
                    result.data.forEach(item => {
                        grid.innerHTML += `
                            <div class="card">
                                <div style="font-size:10px; color:var(--accent); font-weight:bold; margin-bottom:5px;">${item.id}</div>
                                <img src="${item.image_url}" class="card-img">
                                <div style="font-size:13px; font-weight:bold;">${item.card_name}</div>
                                <div style="margin-top:10px; font-size:11px;">
                                    <div style="display:flex; justify-content:space-between;"><span>行情</span><span>${item.market_price_twd}</span></div>
                                    <div style="display:flex; justify-content:space-between; margin-top:5px;"><span style="color:#777">PSA 10</span><span style="color:var(--gold)">${item.psa10_est}</span></div>
                                </div>
                            </div>`;
                    });
                } else { grid.innerHTML = '<div class="status">查無資料，請稍後再試。</div>'; }
            } catch (e) { grid.innerHTML = '<div class="status">連線失敗。</div>'; }
        }
    </script>
</body>
</html>
