<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTCG 行情終端</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .search-box { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input { padding: 12px; width: 200px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; }
        button { padding: 12px 20px; background: #ffcc00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; width: 250px; border: 1px solid #333; text-align: left; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .price-twd { color: #ffcc00; font-size: 20px; font-weight: bold; }
        .price-usd { color: #888; font-size: 12px; }
        .set-info { font-size: 11px; color: #aaa; background: #333; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="search-box">
        <input type="text" id="cardName" placeholder="搜尋卡片...">
        <button onclick="search()">分析</button>
        <p id="status" style="font-size: 12px; color: #666; margin-top: 10px;">📡 雲端連線正常</p>
    </div>
    <div id="result" class="card-list"></div>

    <script>
        async function search() {
            const name = document.getElementById('cardName').value;
            const resultDiv = document.getElementById('result');
            const status = document.getElementById('status');
            if(!name) return;

            status.innerText = "⏳ 正在讀取 Render 數據...";
            resultDiv.innerHTML = "";

            try {
                // 對接你截圖中確認成功的網址
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(name)}`);
                const json = await res.json();

                if(json.status === 'success') {
                    status.innerText = `✅ 找到 ${json.data.length} 筆數據`;
                    json.data.forEach(item => {
                        // 處理匯率換算
                        const usd = parseFloat(item.market_price.replace('$ ', '')) || 0;
                        const twd = Math.round(usd * 32.5);

                        resultDiv.innerHTML += `
                            <div class="card">
                                <img src="${item.image_url}">
                                <div style="font-weight:bold; margin-bottom:5px;">${item.card_name}</div>
                                <span class="set-info">${item.set_info}</span>
                                <div style="margin-top:10px;">
                                    <div class="price-twd">NT$ ${twd.toLocaleString()}</div>
                                    <div class="price-usd">$ ${item.market_price} (TCGPlayer)</div>
                                </div>
                                <div style="font-size:9px; color:#444; margin-top:10px;">更新: ${item.update_time}</div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                status.innerText = "❌ 請求失敗，請確認後端已啟動。";
            }
        }
    </script>
</body>
</html>
