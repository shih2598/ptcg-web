<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>PTCG 日版專業數據終端</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --panel: #1a1a1a; --cyan: #00f2ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; text-align: center; }
        .search-area { background: var(--panel); padding: 30px; border-radius: 20px; border: 1px solid #333; margin-bottom: 25px; }
        input { width: 60%; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: white; font-size: 18px; outline: none; }
        button { background: var(--gold); border: none; padding: 15px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-left: 10px; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        .card { background: var(--panel); border-radius: 20px; padding: 20px; border: 1px solid #222; text-align: left; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .label { color: #888; font-size: 12px; }
        .value { color: var(--gold); font-size: 18px; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-area">
            <h2 style="color:var(--gold)">PTCG 日版數據檢索</h2>
            <p style="font-size:12px; color:#666;">支援中文 (如: 炭小侍) 或 日版編號 (如: SV4K-014)</p>
            <input type="text" id="q" placeholder="開始搜尋...">
            <button onclick="doSearch()">分析行情</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>
    <script>
        async function doSearch() {
            const val = document.getElementById('q').value.trim();
            const grid = document.getElementById('grid');
            if(!val) return;
            grid.innerHTML = "數據加載中...";
            try {
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(val)}`);
                const result = await res.json();
                grid.innerHTML = "";
                if(result.status === "success" && result.data.length > 0) {
                    result.data.forEach(item => {
                        grid.innerHTML += `
                            <div class="card">
                                <div style="color:var(--cyan); font-size:12px; margin-bottom:5px;">ID: ${item.id}</div>
                                <img src="${item.image_url}" class="card-img">
                                <div style="font-weight:bold; margin-bottom:10px;">${item.card_name}</div>
                                <div style="background:#000; padding:10px; border-radius:10px;">
                                    <span class="label">預估市價 (TWD)</span>
                                    <span class="value">${item.market_price}</span>
                                    <span class="label" style="margin-top:10px;">PSA 10 參考</span>
                                    <span class="value" style="color:var(--cyan)">${item.psa10}</span>
                                </div>
                            </div>`;
                    });
                } else { grid.innerHTML = "查無此資料"; }
            } catch (e) { grid.innerHTML = "連線失敗"; }
        }
    </script>
</body>
</html>
