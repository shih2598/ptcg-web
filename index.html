<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTCG 行情終端 - 專業監控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark-bg: #0a0a0a; --card-bg: #161616; --up-green: #4caf50; }
        body { background: var(--dark-bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { background: #1a1a1a; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .version-selector { display: flex; gap: 8px; margin-bottom: 12px; }
        .v-tag { padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #333; color: #888; }
        .v-tag.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .search-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #222; color: white; outline: none; }
        button { padding: 10px 18px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 10px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 10px; border: 1px solid #222; position: relative; }
        .rank { position: absolute; top: 8px; left: 8px; background: var(--gold); color: #000; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .card-img { width: 100%; border-radius: 10px; margin-bottom: 8px; }
        .card-name { font-size: 11px; font-weight: bold; height: 32px; overflow: hidden; margin-bottom: 8px; }
        .data-box { border-top: 1px solid #222; padding-top: 8px; }
        .data-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; }
        .label { color: #888; }
        .val { color: #fff; font-weight: 600; }
        .psa-val { color: var(--gold); font-weight: bold; }
        .up { color: var(--up-green); }
        .chart-btn { width: 100%; margin-top: 8px; padding: 6px; background: #222; color: var(--gold); border: 1px solid #333; border-radius: 8px; font-size: 9px; }
        .chart-con { display: none; margin-top: 8px; background: #000; border-radius: 8px; padding: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="version-selector">
            <div class="v-tag active" onclick="setVer('tc', this)">繁中版</div>
            <div class="v-tag" onclick="setVer('jp', this)">日文版</div>
            <div class="v-tag" onclick="setVer('en', this)">英文版</div>
        </div>
        <div class="search-group">
            <input type="text" id="cardName" placeholder="搜尋 (如: Charizard 或 base1-4)">
            <button onclick="doSearch()">分析</button>
        </div>
    </div>

    <div id="result-grid" class="grid"></div>

    <script>
        let lang = 'tc';
        function setVer(l, el) {
            lang = l;
            document.querySelectorAll('.v-tag').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(document.getElementById('cardName').value) doSearch();
        }

        async function doSearch() {
            const query = document.getElementById('cardName').value;
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '<div style="grid-column:1/3; text-align:center; padding:40px;">⚡ 同步市場漲幅數據中...</div>';

            try {
                const res = await fetch(`https://ptcg-api-service.onrender.com/api/search?name=${encodeURIComponent(query)}&lang=${lang}`);
                const result = await res.json();
                if (result.status === "success") {
                    grid.innerHTML = "";
                    result.data.forEach((item, i) => {
                        const price = Math.round((parseFloat(item.market_price.replace('$ ', '')) || 0) * 32.5);
                        const cid = `c-${i}`;
                        grid.innerHTML += `
                            <div class="card">
                                <div class="rank">${i+1}</div>
                                <img src="${item.image_url}" class="card-img">
                                <div class="card-name">${item.card_name}</div>
                                <div class="data-box">
                                    <div class="data-row"><span class="label">市場行情</span><span class="val">NT$ ${price.toLocaleString()}</span></div>
                                    <div class="data-row"><span class="label">PSA 10 預估</span><span class="psa-val">${item.psa10_price}</span></div>
                                    <div class="data-row"><span class="label">7D 漲幅</span><span class="val up">${item.trend_7d} ↑</span></div>
                                    <div class="data-row"><span class="label">30D 漲幅</span><span class="val up">${item.trend_30d} ↑</span></div>
                                </div>
                                <button class="chart-btn" onclick="toggleChart('${cid}')">📉 漲跌趨勢圖</button>
                                <div class="chart-con" id="con-${cid}"><canvas id="${cid}" height="80"></canvas></div>
                            </div>`;
                    });
                }
            } catch (e) { grid.innerHTML = "連線失敗"; }
        }

        function toggleChart(id) {
            const box = document.getElementById("con-" + id);
            box.style.display = (box.style.display === "block") ? "none" : "block";
            if (box.style.display === "block") {
                new Chart(document.getElementById(id).getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: ['','','','','','',''],
                        datasets: [{ data: [70, 72, 85, 82, 90, 95, 100], borderColor: '#ffcc00', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(255, 204, 0, 0.05)', tension: 0.4 }]
                    },
                    options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
                });
            }
        }
    </script>
</body>
</html>
